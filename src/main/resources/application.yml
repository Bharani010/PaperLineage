spring:
  application:
    name: paperlineage
  main:
    web-application-type: servlet
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:}
    connection-timeout: 5s

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

groq:
  api-key: ${GROQ_API_KEY:}

github:
  token: ${GITHUB_TOKEN:}

cohere:
  api-key: ${COHERE_API_KEY:}

semantic-scholar:
  api-key: ${SEMANTIC_SCHOLAR_API_KEY:}

supabase:
  url: ${SUPABASE_URL:}
  service-key: ${SUPABASE_SERVICE_KEY:}
