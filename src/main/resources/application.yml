spring:
  application:
    name: paperlineage

server:
  port: ${PORT:8080}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

github:
  token: ${GITHUB_TOKEN:}

huggingface:
  api-key: ${HUGGINGFACE_API_KEY:}

semantic-scholar:
  api-key: ${SEMANTIC_SCHOLAR_API_KEY:}

neo4j:
  uri: ${NEO4J_URI:}
  authentication:
    username: ${NEO4J_USERNAME:}
    password: ${NEO4J_PASSWORD:}

supabase:
  url: ${SUPABASE_URL:}
  service-key: ${SUPABASE_SERVICE_KEY:}
